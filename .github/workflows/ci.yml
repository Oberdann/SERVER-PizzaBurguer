name: CI - PizzaBurguder (Vercel)

on:
  push:
    branches:
      - vercel-deploy

jobs:
  build-aplicacao:
    runs-on: ubuntu-latest

    steps:
      - name: Clonar respositório
        uses: actions/checkout@v3

      - name: Instalar Node
        uses: actions/setup-node@v3

      - name: Instalar dependências
        run: npm ci

      - name: Rodar lint
        run: npm run lint

      - name: Rodar testes
        run: npm run test

      - name: Buildar aplicação
        run: npm run build

  deploy-vercel:
    runs-on: ubuntu-latest
    needs: build-aplicacao

    steps:
      - name: Checkout
        uses: actions/checkout@v3

      - name: Deploy na Vercel
        run: npx vercel --prod --token ${{ secrets.VERCEL_TOKEN }} --yes --confirm --name server-pizza-burguer
